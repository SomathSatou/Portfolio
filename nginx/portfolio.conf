# Nginx configuration for automia.org Portfolio + JDR
# Copy to /etc/nginx/sites-available/portfolio and symlink to sites-enabled.
# Adjust paths and port numbers as needed.

upstream django_http {
    server 127.0.0.1:8000;  # Gunicorn (HTTP API + static)
}

upstream django_ws {
    server 127.0.0.1:8001;  # Daphne (ASGI / WebSocket)
}

server {
    listen 80;
    server_name automia.org www.automia.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name automia.org www.automia.org;

    # --- SSL (adjust paths to your certs) ---
    ssl_certificate     /etc/letsencrypt/live/automia.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/automia.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 10M;

    # --- Frontend (Vite build) ---
    root /var/www/Portfolio/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Django API ---
    location /api/ {
        proxy_pass http://django_http;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Django Admin ---
    location /admin/ {
        proxy_pass http://django_http;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- WebSocket (chat JDR) — CRITICAL for chat to work ---
    location /ws/ {
        proxy_pass http://django_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;  # Keep WS alive for 24h
    }

    # --- Django static files ---
    location /static/ {
        alias /var/www/Portfolio/backend/static/;
    }

    # --- Django media files (avatars, etc.) ---
    location /media/ {
        alias /var/www/Portfolio/backend/media/;
    }
}
