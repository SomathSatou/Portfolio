name: portfolio-build
run-name: full deployment for portfolio on automia
on:
  push:
    branches:
      - main
jobs:
  automia-deploy-portfolio:
    runs-on: ubuntu-latest

    steps:
      - name: Init SSH on runner
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_AUTOMIA_DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsaz
          echo "=== SSH key configured ==="
          echo "Scanning host ${{ vars.SSH_AUTOMIA_HOST }}..."
          ssh-keyscan -H ${{ vars.SSH_AUTOMIA_HOST }} >> ~/.ssh/known_hosts 2>&1 || {
            echo "ERROR: Failed to scan SSH host ${{ vars.SSH_AUTOMIA_HOST }}"
            exit 1
          }
          echo "=== SSH host added to known_hosts ==="

      - name: Pre-deploy checks
        run: |
          echo "::group::Pre-deploy Migration Check"
          ssh ${{ vars.SSH_AUTOMIA_USER }}@${{ vars.SSH_AUTOMIA_HOST }} 'bash -s' <<'EOF'
            DEPLOY_DIR="/var/www/Portfolio"
            cd "${DEPLOY_DIR}/backend" || exit 1
            source "${DEPLOY_DIR}/backend/.venv/bin/activate"
            echo "--- Django Migration Status ---"
            python manage.py showmigrations 2>&1 || true
            echo ""
            echo "--- Checking for pending migrations ---"
            if python manage.py migrate --check --noinput 2>&1; then
              echo "✓ All migrations are up to date"
            else
              echo "⚠ Pending migrations detected - will be applied during deployment"
            fi
          EOF
          echo "::endgroup::"

      - name: Backup database
        run: |
          echo "::group::Database Backup"
          ssh ${{ vars.SSH_AUTOMIA_USER }}@${{ vars.SSH_AUTOMIA_HOST }} 'bash -s' <<'EOF'
            # Load environment variables for DB credentials
            ENV_FILE="/etc/portfolio.env"
            if [ -f "$ENV_FILE" ]; then
              set -a
              source "$ENV_FILE"
              set +a
            fi

            BACKUP_DIR="/var/www/Backup"
            BACKUP_FILE="${BACKUP_DIR}/$(date +%Y%m%d_%H%M%S)_backup.sql"
            mkdir -p "${BACKUP_DIR}"

            # Use DB credentials from env, fallback to root with .my.cnf if configured
            DB_USER="${DB_USER:-root}"
            DB_NAME="${DB_NAME:-portfolio}"

            echo "Backing up database ${DB_NAME} as ${DB_USER}..."
            if [ -n "$DB_PASSWORD" ]; then
              if ! mysqldump -u "${DB_USER}" -p"${DB_PASSWORD}" "${DB_NAME}" > "${BACKUP_FILE}" 2>&1; then
                echo "::error::Database backup failed (with password)"
                exit 1
              fi
            else
              # Try without password (unix socket auth or .my.cnf)
              if ! mysqldump -u "${DB_USER}" "${DB_NAME}" > "${BACKUP_FILE}" 2>&1; then
                echo "::error::Database backup failed (no password)"
                exit 1
              fi
            fi

            echo "✓ Backup saved: ${BACKUP_FILE}"
            ls -lh "${BACKUP_FILE}"
            echo "BACKUP_FILE=${BACKUP_FILE}" >> /tmp/deploy_env.sh
          EOF
          echo "::endgroup::"

      - name: Deploy application
        run: |
          echo "::group::Deployment"
          ssh ${{ vars.SSH_AUTOMIA_USER }}@${{ vars.SSH_AUTOMIA_HOST }} 'bash -s' <<'EOF'
            DEPLOY_DIR="/var/www/Portfolio"
            cd "${DEPLOY_DIR}" || { echo "::error::Cannot access ${DEPLOY_DIR}"; exit 1; }

            echo "Configuring git safe directory..."
            git config --global --add safe.directory "${DEPLOY_DIR}"

            echo "Pulling latest changes..."
            git pull origin main || { echo "::error::git pull failed"; exit 1; }

            if [ ! -f "${DEPLOY_DIR}/deploy.sh" ]; then
              echo "::error::deploy.sh not found"
              exit 1
            fi
            echo "Running deploy.sh..."
            if ! bash "${DEPLOY_DIR}/deploy.sh"; then
              EXIT_CODE=$?
              echo "::error::deploy.sh failed with exit code ${EXIT_CODE}"
              exit ${EXIT_CODE}
            fi
            if ! systemctl is-active --quiet portfolio; then
              echo "::warning::Service 'portfolio' is not active after deployment"
            fi
          EOF
          echo "::endgroup::"

      - name: Verify deployment
        if: always()
        run: |
          echo "::group::Post-Deploy Verification"
          ssh ${{ vars.SSH_AUTOMIA_USER }}@${{ vars.SSH_AUTOMIA_HOST }} 'bash -s' <<'EOF'
            echo "--- Service Status ---"
            systemctl status portfolio --no-pager -l || true
            echo ""
            echo "--- Recent Logs (portfolio) ---"
            journalctl -u portfolio --since "5 minutes ago" --no-pager -l || true
            echo ""
            echo "--- Deploy script log (if exists) ---"
            if [ -f /var/www/Portfolio/deploy.log ]; then
              tail -50 /var/www/Portfolio/deploy.log
            fi
          EOF
          echo "::endgroup::"
