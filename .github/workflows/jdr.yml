name: portfolio-build
run-name: Fake full deployment on POC automia
on: [push]
jobs:
  automia-deploy-portfolio:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Init SSH on runner
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_AUTOMIA_DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "Trying a ssh-keyscan on {{ vars.SSH_AUTOMIA_HOST }}"
          ssh-keyscan -H ${{ vars.SSH_AUTOMIA_HOST }} >> ~/.ssh/known_hosts

      - name: Test Backup
        run: |
          ssh ${{ vars.SSH_AUTOMIA_USER }}@${{ vars.SSH_AUTOMIA_HOST }} bash <<'EOF'
          set -e
          mkdir -p /var/www/Backup
          sudo mysqldump -u root portfolio > /var/www/Backup/$(date +%Y%m%d)_backup.sql
          echo "Backup OK"
          cd /var/www/Portfolio
          ./deploy.sh
          sudo mysqldump -u root portfolio < /var/www/Backup/$(date +%Y%m%d)_backup.sql 
          EOF
